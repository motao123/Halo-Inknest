<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(title='文章归档', description='按时间浏览所有文章', type='website', image=${theme.config.basic.global_banner}, publishedTime=${null}, modifiedTime=${null}, authorName=${null}, url='/archives')}"></head>
<body>
  <th:block th:replace="~{modules/header :: header}"></th:block>
  <th:block th:replace="~{modules/banner :: banner(title='文章归档', subtitle='按时间收藏每一次表达', image=${null})}"></th:block>

  <main class="site-main">
    <section class="section-archives">
      <div class="container container--narrow">
        <div class="archives-list" th:if="${archives != null and archives.items != null}">
          <th:block th:each="archive : ${archives.items}">
            <div class="archive-year-group">
              <h2 th:text="${archive.year}">2026</h2>
              <th:block th:each="month : ${archive.months}">
                <div class="archive-month-group">
                  <h3 th:text="${month.month} + ' 月'">6 月</h3>
                  <a class="archive-item" th:each="post : ${month.posts}" th:href="@{${post.status.permalink}}">
                    <time th:if="${post.spec.publishTime != null}" th:datetime="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}" th:text="${#temporals.format(post.spec.publishTime, 'MM-dd')}">06-18</time>
                    <span th:text="${post.spec.title}">文章标题</span>
                  </a>
                </div>
              </th:block>
            </div>
          </th:block>
        </div>
        <div class="empty-state" th:if="${archives == null or archives.total == null or archives.total le 0}">
          <h2>暂无归档</h2>
          <p>发布文章后，这里会按年月整理内容。</p>
        </div>
        <th:block th:replace="~{modules/pagination :: pagination(items=${archives})}"></th:block>
      </div>
    </section>
  </main>

  <th:block th:replace="~{modules/footer :: footer}"></th:block>
</body>
</html>
