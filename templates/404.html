<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(title='页面不存在', description='你访问的页面不存在')}"></head>
<body>
  <th:block th:replace="~{modules/header :: header}"></th:block>
  <main class="site-main error-main">
    <section class="error-card">
      <p class="section-kicker">404</p>
      <h1>页面走丢了</h1>
      <p>你访问的页面可能已经移动、删除，或者地址输入有误。</p>
      <div class="error-actions">
        <a class="button" th:href="@{/}">返回首页</a>
        <a class="button button--ghost" th:href="@{/archives}">查看归档</a>
      </div>
    </section>
  </main>
  <th:block th:replace="~{modules/footer :: footer}"></th:block>
</body>
</html>
