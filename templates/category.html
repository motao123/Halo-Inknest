<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(title=${category.spec.displayName}, description=${category.spec.description}, type='website', image=${theme.config.basic.global_banner}, publishedTime=${null}, modifiedTime=${null}, authorName=${null}, url=${category.status.permalink}, robots=${null})}"></head>
<body>
  <th:block th:replace="~{modules/header :: header}"></th:block>
  <th:block th:replace="~{modules/banner :: banner(title=${category.spec.displayName}, subtitle=${category.spec.description}, image=${null})}"></th:block>

  <main class="site-main" id="site-main">
    <section class="section-posts">
      <div class="container container--narrow">
        <div class="post-list" th:if="${posts != null and posts.total != null and posts.total gt 0}" data-layout="list">
          <th:block th:each="post : ${posts.items}">
            <th:block th:replace="~{modules/post-card :: post-card(post=${post})}"></th:block>
          </th:block>
        </div>
        <div class="empty-state" th:if="${posts == null or posts.total == null or posts.total le 0}">
          <h2>这个分类还没有文章</h2>
          <p>可以先浏览其它分类或返回归档。</p>
        </div>
        <th:block th:replace="~{modules/pagination :: pagination(items=${posts})}"></th:block>
      </div>
    </section>
  </main>

  <th:block th:replace="~{modules/footer :: footer}"></th:block>
</body>
</html>
