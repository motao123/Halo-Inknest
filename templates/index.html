<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(title=${null}, description=${theme.config.basic.site_description}, type='website', image=${theme.config.basic.global_banner}, publishedTime=${null}, modifiedTime=${null}, authorName=${null}, url='/', robots=${null}, sectionName=${null}, tagItems=${null})}"></head>
<body>
  <th:block th:replace="~{modules/header :: header}"></th:block>
  <th:block th:replace="~{modules/banner :: banner(title=${site.title}, subtitle=${theme.config.basic.site_description ?: site.subtitle}, image=${null}, priority=${true})}"></th:block>

  <main class="site-main" id="site-main">
    <section class="section-posts">
      <div class="container">
        <div class="content-shell">
          <header class="section-head">
            <div>
              <p class="section-kicker">Latest Posts</p>
              <h2>最新文章</h2>
            </div>
            <a th:href="@{/archives}">全部归档</a>
          </header>

          <div class="post-list" th:if="${posts != null and posts.total != null and posts.total gt 0}" data-layout="list">
            <th:block th:each="post : ${posts.items}">
              <th:block th:replace="~{modules/post-card :: post-card(post=${post})}"></th:block>
            </th:block>
          </div>

          <div class="empty-state" th:if="${posts == null or posts.total == null or posts.total le 0}">
            <h2>还没有文章</h2>
            <p>写下第一篇内容后，它会出现在这里。</p>
          </div>

          <th:block th:replace="~{modules/pagination :: pagination(items=${posts})}"></th:block>
        </div>
      </div>
    </section>
  </main>

  <th:block th:replace="~{modules/footer :: footer}"></th:block>
</body>
</html>
