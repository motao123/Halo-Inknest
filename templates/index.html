<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(title='首页', description=${theme.config.basic.site_description})}"></head>
<body>
  <th:block th:replace="~{modules/header :: header}"></th:block>
  <th:block th:replace="~{modules/banner :: banner(title=${site.title}, subtitle=${theme.config.basic.site_description ?: site.subtitle}, image=${theme.config.banner.home_banner})}"></th:block>

  <main class="site-main">
    <section class="section-posts">
      <div class="container" th:classappend="${(theme.config.sidebar.enabled == null or theme.config.sidebar.enabled) and theme.config.sidebar.mode == 'fixed'} ? ' layout-shell' : ''">
        <div class="content-shell">
          <header class="section-head">
            <div>
              <p class="section-kicker">Latest Posts</p>
              <h2>最新文章</h2>
            </div>
            <a th:href="@{/archives}">全部归档</a>
          </header>

          <div class="post-list" th:if="${posts != null and posts.total != null and posts.total gt 0}" th:attr="data-layout=${theme.config.post.list_layout ?: 'list'}">
            <th:block th:each="post : ${posts.items}">
              <th:block th:if="${theme.config.post.list_layout == 'cover'}" th:replace="~{modules/post-card-cover :: post-card-cover(post=${post})}"></th:block>
              <th:block th:unless="${theme.config.post.list_layout == 'cover'}" th:replace="~{modules/post-card :: post-card(post=${post})}"></th:block>
            </th:block>
          </div>

          <div class="empty-state" th:if="${posts == null or posts.total == null or posts.total le 0}">
            <h2>还没有文章</h2>
            <p>写下第一篇内容后，它会出现在这里。</p>
          </div>

          <th:block th:replace="~{modules/pagination :: pagination(items=${posts})}"></th:block>
        </div>

        <th:block th:if="${(theme.config.sidebar.enabled == null or theme.config.sidebar.enabled) and theme.config.sidebar.mode == 'fixed'}" th:replace="~{modules/sidebar :: sidebar(extraClass='site-sidebar--fixed')}"></th:block>
      </div>
    </section>
  </main>

  <th:block th:replace="~{modules/footer :: footer}"></th:block>
</body>
</html>
