<th:block th:fragment="banner(title, subtitle, image, priority)">
  <section class="hero-banner" th:with="bannerImage=${(image ?: '') != '' ? image : ((theme.config.basic.global_banner ?: '') != '' ? theme.config.basic.global_banner : '/themes/theme-inknest/assets/images/default-banner.png')}, highPriority=${priority == null or priority}">
    <picture class="hero-bg">
      <source th:if="${bannerImage == '/themes/theme-inknest/assets/images/default-banner.png'}" th:srcset="@{/assets/images/default-banner.webp}" type="image/webp">
      <img th:if="${bannerImage != null and bannerImage != ''}" th:src="@{${bannerImage}}" alt="" aria-hidden="true" width="1600" height="600" decoding="async" th:attr="loading=${highPriority ? 'eager' : 'lazy'},fetchpriority=${highPriority ? 'high' : 'auto'}">
    </picture>
    <div class="hero-mask"></div>
    <div class="hero-content">
      <p class="hero-kicker">InkNest</p>
      <h1 th:text="${title != null and title != '' ? title : site.title}">InkNest</h1>
      <p th:if="${subtitle != null and subtitle != ''}" th:text="${subtitle}">把灵感安放在文字的巢里</p>
    </div>
  </section>
</th:block>
