<th:block th:fragment="banner(title, subtitle, image)">
  <section class="hero-banner">
    <div class="hero-bg" th:with="bannerImage=${(theme.config.basic.global_banner ?: '') != '' ? theme.config.basic.global_banner : '/themes/theme-inknest/assets/images/screenshot.png'}" th:style="${bannerImage != null and bannerImage != '' ? 'background-image:url(' + bannerImage + ');' : ''}"></div>
    <div class="hero-mask"></div>
    <div class="hero-content">
      <p class="hero-kicker">InkNest</p>
      <h1 th:text="${title != null and title != '' ? title : site.title}">InkNest</h1>
      <p th:if="${subtitle != null and subtitle != ''}" th:text="${subtitle}">把灵感安放在文字的巢里</p>
    </div>
  </section>
</th:block>
