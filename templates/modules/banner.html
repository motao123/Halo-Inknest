<th:block th:fragment="banner(title, subtitle, image)">
  <section class="hero-banner" th:with="bannerImage=${(image ?: '') != '' ? image : ((theme.config.basic.global_banner ?: '') != '' ? theme.config.basic.global_banner : '/themes/theme-inknest/assets/images/default-banner.png')}">
    <div class="hero-bg">
      <img th:if="${bannerImage != null and bannerImage != ''}" th:src="@{${bannerImage}}" alt="" aria-hidden="true" loading="eager" decoding="async" fetchpriority="high">
    </div>
    <div class="hero-mask"></div>
    <div class="hero-content">
      <p class="hero-kicker">InkNest</p>
      <h1 th:text="${title != null and title != '' ? title : site.title}">InkNest</h1>
      <p th:if="${subtitle != null and subtitle != ''}" th:text="${subtitle}">把灵感安放在文字的巢里</p>
    </div>
  </section>
</th:block>
