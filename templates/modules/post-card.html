<th:block th:fragment="post-card(post)">
  <article class="post-card">
    <a class="post-card-cover" th:if="${(theme.config.post.show_cover == null or theme.config.post.show_cover) and ((post.spec.cover ?: '') != '' or (theme.config.basic.default_cover ?: '') != '')}" th:href="@{${post.status.permalink}}">
      <img th:src="${(post.spec.cover ?: '') != '' ? post.spec.cover : theme.config.basic.default_cover}" th:alt="${post.spec.title}" loading="lazy">
    </a>
    <div class="post-card-body">
      <div class="post-date" th:if="${post.spec.publishTime != null}">
        <span th:text="${#temporals.format(post.spec.publishTime, 'dd')}">01</span>
        <small th:text="${#temporals.format(post.spec.publishTime, 'yyyy.MM')}">2026.06</small>
      </div>
      <div class="post-main">
        <div class="post-meta">
          <a th:if="${(theme.config.post.show_category == null or theme.config.post.show_category) and post.categories != null and !#lists.isEmpty(post.categories)}" th:href="@{${post.categories[0].status.permalink}}" th:text="${post.categories[0].spec.displayName}">分类</a>
          <span th:if="${(theme.config.post.show_visit_count == null or theme.config.post.show_visit_count) and post.stats != null}">浏览 <span th:text="${post.stats.visit}">0</span></span>
        </div>
        <h2><a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}">文章标题</a></h2>
        <p class="post-excerpt" th:text="${post.status.excerpt != null and post.status.excerpt != '' ? post.status.excerpt : '这篇文章还没有摘要。'}">文章摘要</p>
        <div class="post-tags" th:if="${(theme.config.post.show_tags == null or theme.config.post.show_tags) and post.tags != null and !#lists.isEmpty(post.tags)}">
          <a th:each="tag : ${post.tags}" th:href="@{${tag.status.permalink}}" th:text="|#${tag.spec.displayName}|">#标签</a>
        </div>
      </div>
    </div>
  </article>
</th:block>
