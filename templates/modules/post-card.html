<th:block th:fragment="post-card(post, layout)">
  <article th:if="${layout == 'grid'}" class="post-card post-card--grid">
    <a class="grid-card-cover" th:if="${(theme.config.post.show_cover == null or theme.config.post.show_cover) and ((post.spec.cover ?: '') != '' or (theme.config.basic.default_cover ?: '') != '')}" th:href="@{${post.status.permalink}}">
      <img th:src="${(post.spec.cover ?: '') != '' ? post.spec.cover : theme.config.basic.default_cover}" th:alt="${post.spec.title}" loading="lazy">
    </a>
    <div class="grid-card-body">
      <div class="post-meta">
        <a th:if="${(theme.config.post.show_category == null or theme.config.post.show_category) and post.categories != null and !#lists.isEmpty(post.categories)}" th:href="@{${post.categories[0].status.permalink}}" th:text="${post.categories[0].spec.displayName}">分类</a>
        <time th:if="${post.spec.publishTime != null}" th:datetime="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}" th:text="${#temporals.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.06.18</time>
      </div>
      <h2><a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}">文章标题</a></h2>
      <p class="post-excerpt" th:text="${post.status.excerpt != null and post.status.excerpt != '' ? post.status.excerpt : '这篇文章还没有摘要。'}">文章摘要</p>
      <div class="post-tags" th:if="${(theme.config.post.show_tags == null or theme.config.post.show_tags) and post.tags != null and !#lists.isEmpty(post.tags)}">
        <a th:each="tag : ${post.tags}" th:href="@{${tag.status.permalink}}" th:text="|#${tag.spec.displayName}|">#标签</a>
      </div>
    </div>
  </article>

  <article th:unless="${layout == 'grid'}" class="post-card post-card--classic post">
    <div th:class="${((post.spec.cover ?: '') != '' or (theme.config.basic.default_cover ?: '') != '') ? 'post-time-img' : 'post-time-img no-thumbnail'}">
      <div class="post-date" th:if="${post.spec.publishTime != null}">
        <span th:text="${#temporals.format(post.spec.publishTime, 'dd')}">18</span>
        <small th:text="${#temporals.format(post.spec.publishTime, 'yyyy年-MM月')}">2026年-06月</small>
      </div>
      <div class="post-date" th:unless="${post.spec.publishTime != null}">
        <span>--</span>
        <small>未发布</small>
      </div>
      <div class="post-preview" th:if="${(post.spec.cover ?: '') != '' or (theme.config.basic.default_cover ?: '') != ''}">
        <a th:href="@{${post.status.permalink}}" aria-label="查看文章">
          <img th:src="${(post.spec.cover ?: '') != '' ? post.spec.cover : theme.config.basic.default_cover}" th:alt="${post.spec.title}" loading="lazy">
        </a>
      </div>
    </div>

    <div class="post-content">
      <h2><a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}">文章标题</a></h2>
      <div class="post-meta">
        <span class="post-category" th:if="${(theme.config.post.show_category == null or theme.config.post.show_category) and post.categories != null and !#lists.isEmpty(post.categories)}">
          <a th:href="@{${post.categories[0].status.permalink}}" th:text="${post.categories[0].spec.displayName}">分类</a>
        </span>
        <time class="post-mobile-date" th:if="${post.spec.publishTime != null}" th:datetime="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}" th:text="${#temporals.format(post.spec.publishTime, 'yyyy年MM月dd日')}">2026年06月18日</time>
        <span th:if="${(theme.config.post.show_visit_count == null or theme.config.post.show_visit_count) and post.stats != null}">浏览 <span th:text="${post.stats.visit}">0</span></span>
      </div>
      <p class="post-excerpt" th:text="${post.status.excerpt != null and post.status.excerpt != '' ? post.status.excerpt : '这篇文章还没有摘要。'}">文章摘要</p>
      <div class="post-tags" th:if="${(theme.config.post.show_tags == null or theme.config.post.show_tags) and post.tags != null and !#lists.isEmpty(post.tags)}">
        <a th:each="tag : ${post.tags}" th:href="@{${tag.status.permalink}}" th:text="|#${tag.spec.displayName}|">#标签</a>
      </div>
    </div>
  </article>
</th:block>
