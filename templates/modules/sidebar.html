<th:block th:fragment="sidebar(extraClass)">
  <aside th:class="${extraClass != null and extraClass != '' ? 'site-sidebar ' + extraClass : 'site-sidebar'}" aria-label="侧边栏">
    <th:block th:if="${theme.config.sidebar.widgets != null and !#lists.isEmpty(theme.config.sidebar.widgets)}">
      <th:block th:each="widget : ${theme.config.sidebar.widgets}">
        <section class="sidebar-widget" th:if="${widget.value == 'site-info'}">
          <h3>关于本站</h3>
          <p th:text="${theme.config.basic.site_description ?: site.subtitle}">把灵感安放在文字的巢里</p>
        </section>

        <section class="sidebar-widget" th:if="${widget.value == 'recent-posts'}" th:with="recent=${postFinder.list({page: 1, size: theme.config.sidebar.recent_post_count ?: 5, sort: {'spec.publishTime,desc'}})}">
          <h3>最新文章</h3>
          <a class="sidebar-post" th:each="post : ${recent.items}" th:href="@{${post.status.permalink}}" th:text="${post.spec.title}">文章标题</a>
        </section>

        <section class="sidebar-widget" th:if="${widget.value == 'random-posts'}" th:with="randomPosts=${postFinder.random(theme.config.sidebar.random_post_count ?: 5)}">
          <h3>随机文章</h3>
          <a class="sidebar-post" th:each="post : ${randomPosts}" th:href="@{${post.status.permalink}}" th:text="${post.spec.title}">文章标题</a>
        </section>

        <section class="sidebar-widget" th:if="${widget.value == 'categories'}" th:with="categories=${categoryFinder.list(1, 20)}">
          <h3>分类</h3>
          <div class="sidebar-cloud">
            <a th:each="category : ${categories.items}" th:href="@{${category.status.permalink}}" th:text="${category.spec.displayName}">分类</a>
          </div>
        </section>

        <section class="sidebar-widget" th:if="${widget.value == 'tags'}" th:with="tags=${tagFinder.list(1, 30)}">
          <h3>标签</h3>
          <div class="sidebar-cloud">
            <a th:each="tag : ${tags.items}" th:href="@{${tag.status.permalink}}" th:text="${tag.spec.displayName}">标签</a>
          </div>
        </section>

        <section class="sidebar-widget" th:if="${widget.value == 'social' and theme.config.social.items != null and !#lists.isEmpty(theme.config.social.items)}">
          <h3>社交链接</h3>
          <div class="social-list">
            <a th:each="item : ${theme.config.social.items}" th:href="@{${item.url}}" th:target="${item.open_in_new_tab ? '_blank' : '_self'}" rel="noopener">
              <span th:text="${item.icon ?: item.name}">G</span>
              <em th:text="${item.name}">GitHub</em>
            </a>
          </div>
        </section>
      </th:block>
    </th:block>
  </aside>
</th:block>
