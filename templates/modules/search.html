<th:block th:fragment="search">
  <div class="search-panel" id="search-panel" role="dialog" aria-modal="true" aria-labelledby="search-title" aria-hidden="true">
    <div class="search-card">
      <button class="search-close" type="button" data-search-close aria-label="关闭搜索">×</button>
      <h2 id="search-title">搜索文章</h2>
      <form class="search-form" th:action="@{${theme.config.navigation.search_action ?: '/search'}}" method="get" role="search">
        <input type="search" th:name="${theme.config.navigation.search_param ?: 'keyword'}" placeholder="输入关键词..." autocomplete="off" aria-label="搜索关键词">
        <button type="submit">搜索</button>
      </form>
      <p th:if="${(theme.config.navigation.search_hint ?: '') != ''}" th:text="${theme.config.navigation.search_hint}">如果当前 Halo 环境未启用搜索能力，请在后台安装或启用搜索相关插件。</p>
    </div>
  </div>
</th:block>
