<th:block th:fragment="footer">
  <th:block th:replace="~{modules/search :: search}"></th:block>
  <th:block th:if="${theme.config.navigation.show_mobile_menu == null or theme.config.navigation.show_mobile_menu}" th:replace="~{modules/mobile-menu :: mobile-menu}"></th:block>

  <button th:if="${theme.config.features.enable_back_to_top == null or theme.config.features.enable_back_to_top}" class="back-to-top" type="button" data-back-to-top aria-label="返回顶部">↑</button>

  <footer class="site-footer">
    <div class="footer-inner" th:with="footerLogo=${theme.config.basic.footer_logo ?: ''}, footerDescription=${theme.config.footer.footer_description ?: ''}, showFooterDescription=${(theme.config.footer.footer_description ?: '') != '' and (theme.config.footer.footer_description ?: '') != 'InkNest，给文字一个安静的归处。'}">
      <div class="footer-brand" th:if="${footerLogo != '' or showFooterDescription}">
        <img th:if="${footerLogo != ''}" th:src="@{${footerLogo}}" th:alt="${site.title}">
        <h2 th:if="${showFooterDescription}" th:text="${site.title}">InkNest</h2>
        <p th:if="${showFooterDescription}" th:text="${footerDescription}">InkNest，给文字一个安静的归处。</p>
      </div>

      <div class="footer-links" th:if="${theme.config.footer.quick_links != null and !#lists.isEmpty(theme.config.footer.quick_links)}">
        <h3>快捷链接</h3>
        <a th:each="link : ${theme.config.footer.quick_links}" th:href="@{${link.url}}" th:text="${link.name}">链接</a>
      </div>

      <div class="footer-links footer-friend-links" th:if="${linkFinder != null and linkFinder.count() > 0}">
        <h3>友情链接</h3>
        <div class="footer-link-row">
          <th:block th:each="group : ${linkFinder.groupBy()}">
            <th:block th:if="${group.links != null and !#lists.isEmpty(group.links)}">
              <a th:each="link : ${group.links}" th:href="${link.spec.url}" target="_blank" rel="noopener noreferrer" th:text="${link.spec.displayName}">友情链接</a>
            </th:block>
          </th:block>
        </div>
      </div>

      <div class="footer-social" th:if="${theme.config.social != null and theme.config.social.items != null and !#lists.isEmpty(theme.config.social.items)}">
        <h3>社交</h3>
        <div class="social-links">
          <th:block th:each="item : ${theme.config.social.items}" th:with="label=${(item.name ?: '') != '' ? item.name : #strings.capitalize(item.platform)}">
            <a th:href="${item.platform == 'email' ? 'mailto:' + item.url : item.url}" th:target="${item.platform == 'email' ? '_self' : '_blank'}" rel="noopener noreferrer" class="social-link" th:aria-label="${label}" th:title="${label}">
              <th:block th:if="${item.platform == 'github'}"><th:block th:replace="~{modules/icons :: github(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'twitter'}"><th:block th:replace="~{modules/icons :: twitter(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'weibo'}"><th:block th:replace="~{modules/icons :: weibo(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'bilibili'}"><th:block th:replace="~{modules/icons :: bilibili(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'zhihu'}"><th:block th:replace="~{modules/icons :: zhihu(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'telegram'}"><th:block th:replace="~{modules/icons :: telegram(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'wechat'}"><th:block th:replace="~{modules/icons :: wechat(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'qq'}"><th:block th:replace="~{modules/icons :: qq(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'email'}"><th:block th:replace="~{modules/icons :: email(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'rss'}"><th:block th:replace="~{modules/icons :: rss(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'juejin'}"><th:block th:replace="~{modules/icons :: juejin(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'linkedin'}"><th:block th:replace="~{modules/icons :: linkedin(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'douban'}"><th:block th:replace="~{modules/icons :: douban(size=18)}"></th:block></th:block>
              <th:block th:if="${item.platform == 'website'}"><th:block th:replace="~{modules/icons :: website(size=18)}"></th:block></th:block>
            </a>
          </th:block>
        </div>
      </div>
    </div>

    <div class="footer-bottom">
      <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> <span th:text="${site.title}">InkNest</span></span>
      <a th:if="${(theme.config.footer.icp_number ?: '') != ''}" th:href="@{${theme.config.footer.icp_url}}" target="_blank" rel="noopener" th:text="${theme.config.footer.icp_number}">ICP备案</a>
      <a th:if="${(theme.config.footer.gongan_number ?: '') != ''}" th:href="@{${theme.config.footer.gongan_url}}" target="_blank" rel="noopener"><img th:src="@{/assets/images/icons/gaba.png}" alt="" loading="lazy"><span th:text="${theme.config.footer.gongan_number}">公安备案</span></a>
      <span th:if="${theme.config.footer.show_theme_credit == null or theme.config.footer.show_theme_credit}">Theme InkNest</span>
    </div>
  </footer>

  <script th:if="${theme.config.features.enable_fancybox == null or theme.config.features.enable_fancybox}" th:src="@{/assets/lib/fancybox/fancybox.js(v=${theme.spec.version})}"></script>
  <script th:src="@{/assets/js/main.js(v=${theme.spec.version})}"></script>
  <script th:if="${theme.config.custom_code.custom_js != null and theme.config.custom_code.custom_js != ''}" th:inline="javascript" th:utext="${theme.config.custom_code.custom_js}"></script>
  <th:block th:utext="${theme.config.custom_code.custom_footer}"></th:block>
  <halo:footer />
</th:block>
