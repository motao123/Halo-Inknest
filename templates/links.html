<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(title='友情链接', description='朋友们的博客')}"></head>
<body>
  <th:block th:replace="~{modules/header :: header}"></th:block>
  <th:block th:replace="~{modules/banner :: banner(title='友情链接', subtitle='朋友们的博客', image=${null})}"></th:block>

  <main class="site-main">
    <section class="section-links">
      <div class="container">
        <div th:if="${singlePage != null and singlePage.content != null and singlePage.content.content != null}" class="page-content prose" th:utext="${singlePage.content.content}">页面内容</div>

        <th:block th:if="${linkFinder != null and linkFinder.count() > 0}">
          <div class="links-group" th:each="group : ${linkFinder.groupBy()}" th:if="${group.links != null and !#lists.isEmpty(group.links)}">
            <h2 th:text="${group.spec.displayName ?: '未分组'}">友链分组</h2>
            <div class="link-grid">
              <a class="link-card" th:each="link : ${group.links}" th:href="${link.spec.url}" target="_blank" rel="noopener noreferrer">
                <div class="link-logo">
                  <img th:if="${(link.spec.logo ?: '') != ''}" th:src="${link.spec.logo}" th:alt="${link.spec.displayName}" loading="lazy">
                  <span th:unless="${(link.spec.logo ?: '') != ''}" th:text="${link.spec.displayName != null and link.spec.displayName.length() > 0 ? #strings.substring(link.spec.displayName, 0, 1).toUpperCase() : '?'}">?</span>
                </div>
                <div>
                  <strong th:text="${link.spec.displayName}">网站名</strong>
                  <p th:if="${(link.spec.description ?: '') != ''}" th:text="${link.spec.description}">简介</p>
                </div>
              </a>
            </div>
          </div>
        </th:block>

        <div class="empty-state" th:if="${linkFinder == null or linkFinder.count() == 0}">
          <h2>暂无友链</h2>
          <p>请在 Halo 后台安装或启用链接管理插件，并添加友链数据。</p>
        </div>
      </div>
    </section>
  </main>

  <th:block th:replace="~{modules/footer :: footer}"></th:block>
</body>
</html>
