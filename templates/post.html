<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(title=${post.spec.title}, description=${post.status.excerpt}, type='article', image=${post.spec.cover}, publishedTime=${post.spec.publishTime}, modifiedTime=${post.status.lastModifyTime}, authorName=${post.owner != null ? post.owner.displayName : null}, url=${post.status.permalink}, robots=${null}, sectionName=${post.categories != null and !post.categories.isEmpty() ? post.categories[0].spec.displayName : null}, tagItems=${post.tags})}"></head>
<body>
  <th:block th:replace="~{modules/header :: header}"></th:block>
  <div th:if="${theme.config.features.enable_reading_progress == null or theme.config.features.enable_reading_progress}" class="reading-progress" id="reading-progress"></div>
  <th:block th:replace="~{modules/banner :: banner(title=${post.spec.title}, subtitle=${post.status.excerpt}, image=${post.spec.cover}, priority=${true})}"></th:block>

  <main class="site-main" id="site-main">
    <article class="post-single">
      <div class="container post-layout">
        <div class="post-main-column">
          <th:block th:replace="~{modules/breadcrumbs :: breadcrumbs(current=${post.spec.title}, parentName=${post.categories != null and !post.categories.isEmpty() ? post.categories[0].spec.displayName : '文章'}, parentUrl=${post.categories != null and !post.categories.isEmpty() ? post.categories[0].status.permalink : '/archives'})}"></th:block>
          <div class="content-shell post-content-shell">
            <header class="post-header">
              <div class="post-meta post-meta--single">
                <a th:if="${(theme.config.post.show_category == null or theme.config.post.show_category) and post.categories != null and !post.categories.isEmpty()}" th:href="@{${post.categories[0].status.permalink}}" th:text="${post.categories[0].spec.displayName}">分类</a>
                <time th:if="${post.spec.publishTime != null}" th:datetime="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}" th:text="${#temporals.format(post.spec.publishTime, 'yyyy年MM月dd日')}">2026年06月18日</time>
                <span th:if="${(theme.config.post.show_visit_count == null or theme.config.post.show_visit_count) and post.stats != null and post.stats.visit != null}"><span th:text="${post.stats.visit}">0</span> 次浏览</span>
                <span th:if="${theme.config.post.show_reading_time == null or theme.config.post.show_reading_time}" data-reading-time>约 1 分钟</span>
              </div>
            </header>

            <aside th:if="${theme.config.post.show_toc == null or theme.config.post.show_toc}" class="post-toc post-toc--mobile" id="post-toc-mobile">
              <button class="post-toc-toggle" type="button" aria-expanded="true" aria-controls="toc-list-mobile" data-toc-toggle>目录</button>
              <nav id="toc-list-mobile" data-toc-list aria-label="文章目录"></nav>
            </aside>

            <div class="post-content prose" id="post-content" th:utext="${post.content != null ? post.content.content : ''}">文章内容</div>

            <div class="post-tags post-tags--single" th:if="${(theme.config.post.show_tags == null or theme.config.post.show_tags) and post.tags != null and !post.tags.isEmpty()}">
              <a th:each="tag : ${post.tags}" th:href="@{${tag.status.permalink}}" th:text="|#${tag.spec.displayName}|">#标签</a>
            </div>

            <div class="post-author-box" th:if="${theme.config.post.show_author_box == null or theme.config.post.show_author_box}" th:with="authorName=${post.owner != null and (post.owner.displayName ?: '') != '' ? post.owner.displayName : site.title}, authorBio=${post.owner != null and (post.owner.bio ?: '') != '' ? post.owner.bio : (theme.config.basic.site_description ?: site.subtitle)}, authorAvatar=${post.owner != null ? (post.owner.avatar ?: '') : ''}">
              <a class="post-author-avatar" th:if="${authorAvatar != ''}" th:href="${(post.owner.permalink ?: '') != '' ? post.owner.permalink : '#'}" aria-label="查看作者主页">
                <img th:src="@{${authorAvatar}}" th:alt="${authorName}" width="46" height="46" loading="lazy" decoding="async">
              </a>
              <a class="post-author-avatar" th:unless="${authorAvatar != ''}" th:href="${post.owner != null and (post.owner.permalink ?: '') != '' ? post.owner.permalink : '#'}" aria-label="查看作者主页" th:text="${authorName != null and authorName.length() > 0 ? #strings.substring(authorName, 0, 1).toUpperCase() : 'I'}">I</a>
              <div>
                <strong><a th:href="${post.owner != null and (post.owner.permalink ?: '') != '' ? post.owner.permalink : '#'}" th:text="${authorName}">InkNest</a></strong>
                <p th:text="${authorBio}">把灵感安放在文字的巢里</p>
              </div>
            </div>

            <div class="post-copyright" th:if="${theme.config.post.show_copyright == null or theme.config.post.show_copyright}">
              <strong>转载说明</strong>
              <p th:text="${theme.config.post.copyright_text ?: '除特别注明外，本站文章采用 CC BY-NC-SA 4.0 协议。转载请注明出处。'}">除特别注明外，本站文章采用 CC BY-NC-SA 4.0 协议。转载请注明出处。</p>
            </div>

            <div class="share-box" th:if="${theme.config.post.show_share == null or theme.config.post.show_share}">
              <span>分享这篇文章</span>
              <div class="share-actions">
                <button type="button" data-share-current>复制链接</button>
              </div>
            </div>

            <nav class="post-nav" th:if="${theme.config.post.show_prev_next == null or theme.config.post.show_prev_next}" th:with="postCursor=${postFinder.cursor(post.metadata.name)}" th:remove="${postCursor.hasPrevious() or postCursor.hasNext()} ? 'none' : 'all'" aria-label="文章导航">
              <a class="post-nav-card post-nav-card--prev" th:if="${postCursor.hasPrevious()}" th:href="@{${postCursor.previous.status.permalink}}" aria-label="上一篇文章">
                <span>上一篇</span>
                <strong th:text="${postCursor.previous.spec.title}">上一篇标题</strong>
              </a>
              <a class="post-nav-card post-nav-card--next" th:if="${postCursor.hasNext()}" th:href="@{${postCursor.next.status.permalink}}" aria-label="下一篇文章">
                <span>下一篇</span>
                <strong th:text="${postCursor.next.spec.title}">下一篇标题</strong>
              </a>
            </nav>
          </div>
        </div>

        <aside th:if="${theme.config.post.show_toc == null or theme.config.post.show_toc}" class="post-toc post-toc--desktop" id="post-toc">
          <button class="post-toc-toggle" type="button" aria-expanded="true" aria-controls="toc-list" data-toc-toggle>目录</button>
          <nav id="toc-list" data-toc-list aria-label="文章目录"></nav>
        </aside>
      </div>
    </article>

    <section th:if="${(theme.config.post.show_comments == null or theme.config.post.show_comments) and haloCommentEnabled and post.spec.allowComment}" class="section-comments section-comments--post">
      <div class="container container--narrow">
        <halo:comment group="content.halo.run" kind="Post" th:attr="name=${post.metadata.name}" />
      </div>
    </section>
  </main>

  <th:block th:replace="~{modules/footer :: footer}"></th:block>
</body>
</html>
