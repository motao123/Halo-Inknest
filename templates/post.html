<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(title=${post.spec.title}, description=${post.status.excerpt})}"></head>
<body>
  <th:block th:replace="~{modules/header :: header}"></th:block>
  <div th:if="${theme.config.features.enable_reading_progress == null or theme.config.features.enable_reading_progress}" class="reading-progress" id="reading-progress"></div>
  <th:block th:replace="~{modules/banner :: banner(title=${post.spec.title}, subtitle=${post.status.excerpt}, image=${(post.spec.cover ?: '') != '' ? post.spec.cover : theme.config.banner.post_banner})}"></th:block>

  <main class="site-main">
    <article class="post-single">
      <div class="container" th:classappend="${theme.config.sidebar.enabled == true and theme.config.sidebar.mode == 'fixed'} ? ' layout-shell' : ''">
        <div class="content-shell post-content-shell">
          <header class="post-header">
            <div class="post-meta post-meta--single">
              <a th:if="${(theme.config.post.show_category == null or theme.config.post.show_category) and post.categories != null and !post.categories.isEmpty()}" th:href="@{${post.categories[0].status.permalink}}" th:text="${post.categories[0].spec.displayName}">分类</a>
              <time th:if="${post.spec.publishTime != null}" th:datetime="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}" th:text="${#temporals.format(post.spec.publishTime, 'yyyy年MM月dd日')}">2026年06月18日</time>
              <span th:if="${(theme.config.post.show_visit_count == null or theme.config.post.show_visit_count) and post.stats != null and post.stats.visit != null}"><span th:text="${post.stats.visit}">0</span> 次浏览</span>
            </div>
          </header>

          <aside th:if="${theme.config.post.show_toc == null or theme.config.post.show_toc}" class="post-toc" id="post-toc">
            <strong>目录</strong>
            <nav id="toc-list"></nav>
          </aside>

          <div class="post-content prose" id="post-content" th:utext="${post.content != null ? post.content.content : ''}">文章内容</div>

          <div class="post-tags post-tags--single" th:if="${(theme.config.post.show_tags == null or theme.config.post.show_tags) and post.tags != null and !post.tags.isEmpty()}">
            <a th:each="tag : ${post.tags}" th:href="@{${tag.status.permalink}}" th:text="|#${tag.spec.displayName}|">#标签</a>
          </div>

          <div class="share-box" th:if="${theme.config.post.show_share == null or theme.config.post.show_share}">
            <span>分享这篇文章</span>
            <button type="button" data-share-current>复制链接</button>
          </div>
        </div>

        <th:block th:if="${theme.config.sidebar.enabled == true and theme.config.sidebar.mode == 'fixed'}" th:replace="~{modules/sidebar :: sidebar(extraClass='site-sidebar--fixed')}"></th:block>
      </div>
    </article>

    <section th:if="${(theme.config.post.show_comments == null or theme.config.post.show_comments) and haloCommentEnabled and post.spec.allowComment}" class="section-comments">
      <div class="container container--narrow">
        <halo:comment group="content.halo.run" kind="Post" th:attr="name=${post.metadata.name}" />
      </div>
    </section>
  </main>

  <th:block th:replace="~{modules/footer :: footer}"></th:block>
</body>
</html>
