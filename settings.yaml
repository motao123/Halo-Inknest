apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-inknest-setting
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: attachment
          name: site_logo
          label: 站点 Logo
          accepts:
            - "image/*"
        - $formkit: attachment
          name: footer_logo
          label: 页脚 Logo
          accepts:
            - "image/*"
        - $formkit: textarea
          name: site_description
          label: 站点描述
          value: "把灵感安放在文字的巢里"
        - $formkit: attachment
          name: favicon
          label: Favicon
          accepts:
            - "image/*"
        - $formkit: attachment
          name: global_banner
          label: 全局 Banner
          help: 建议使用横向图片，推荐宽度 1600px 以上
          accepts:
            - "image/*"
    - group: navigation
      label: 导航设置
      formSchema:
        - $formkit: checkbox
          name: show_search
          label: 显示搜索入口
          value: true
        - $formkit: checkbox
          name: show_mobile_menu
          label: 启用移动菜单
          value: true
        - $formkit: text
          name: search_action
          label: 搜索路径
          value: "/search"
          validation: "required"
        - $formkit: text
          name: search_param
          label: 搜索参数名
          value: "keyword"
          validation: "required|matches:/^[A-Za-z0-9_-]+$/"
        - $formkit: text
          name: search_hint
          label: 搜索提示文案
          value: "如果当前 Halo 环境未启用搜索能力，请在后台安装或启用搜索相关插件。"
        - $formkit: text
          name: search_placeholder
          label: 搜索框占位文案
          value: "输入关键词..."
        - $formkit: checkbox
          name: enable_search_shortcut
          label: 启用 / 快捷键打开搜索
          value: true

    - group: post
      label: 文章设置
      formSchema:
        - $formkit: number
          name: excerpt_length
          label: 摘要字数
          value: 120
          validation: "min:20|max:300"
        - $formkit: select
          name: list_style
          label: 文章列表左侧样式
          value: date
          options:
            - label: 日期块
              value: date
            - label: 封面图
              value: cover
            - label: 有封面时显示封面
              value: auto
        - $formkit: checkbox
          name: show_category
          label: 显示分类
          value: true
        - $formkit: checkbox
          name: show_tags
          label: 显示标签
          value: true
        - $formkit: checkbox
          name: show_visit_count
          label: 显示浏览量
          value: true
        - $formkit: checkbox
          name: show_reading_time
          label: 显示阅读时间
          value: true
        - $formkit: checkbox
          name: show_toc
          label: 显示文章目录
          value: true
        - $formkit: checkbox
          name: show_share
          label: 显示分享按钮
          value: true
        - $formkit: checkbox
          name: show_author_box
          label: 显示作者信息框
          value: true
        - $formkit: checkbox
          name: show_copyright
          label: 显示转载说明
          value: true
        - $formkit: textarea
          name: copyright_text
          label: 转载说明文案
          value: "除特别注明外，本站文章采用 CC BY-NC-SA 4.0 协议。转载请注明出处。"
        - $formkit: checkbox
          name: show_prev_next
          label: 显示上一篇 / 下一篇
          value: true
        - $formkit: checkbox
          name: show_comments
          label: 显示评论区
          value: true

    - group: social
      label: 社交链接
      formSchema:
        - $formkit: repeater
          name: items
          label: 社交媒体
          value: []
          children:
            - $formkit: select
              name: platform
              label: 平台
              value: github
              options:
                - label: GitHub
                  value: github
                - label: Twitter / X
                  value: twitter
                - label: 微博
                  value: weibo
                - label: 哔哩哔哩
                  value: bilibili
                - label: 知乎
                  value: zhihu
                - label: Telegram
                  value: telegram
                - label: 微信
                  value: wechat
                - label: QQ
                  value: qq
                - label: 邮箱
                  value: email
                - label: RSS
                  value: rss
                - label: 掘金
                  value: juejin
                - label: LinkedIn
                  value: linkedin
                - label: 豆瓣
                  value: douban
                - label: 个人网站
                  value: website
            - $formkit: text
              name: url
              label: 链接地址
              placeholder: https://...；邮箱平台只填邮箱地址
              help: "选择邮箱平台时只填写邮箱地址，不要填写 mailto:"
              validation: "required"
            - $formkit: text
              name: name
              label: 显示名称（可选）
              placeholder: 留空则使用平台名称

    - group: footer
      label: 页脚设置
      formSchema:
        - $formkit: checkbox
          name: show_friend_links
          label: 页脚显示友情链接
          value: true
        - $formkit: number
          name: friend_links_limit
          label: 每组页脚友情链接数量
          value: 12
          validation: "min:1|max:50"
        - $formkit: repeater
          name: quick_links
          label: 快捷链接
          value: []
          children:
            - $formkit: text
              name: name
              label: 名称
              validation: "required"
            - $formkit: text
              name: url
              label: 链接
              validation: "required"
        - $formkit: text
          name: icp_number
          label: ICP 备案号
        - $formkit: text
          name: icp_url
          label: ICP 备案链接
          value: "https://beian.miit.gov.cn/"
          validation: "url"
        - $formkit: text
          name: gongan_number
          label: 公安联网备案号
        - $formkit: text
          name: gongan_url
          label: 公安联网备案链接
          value: "https://beian.mps.gov.cn/#/query/webSearch"
          validation: "url"
        - $formkit: checkbox
          name: show_theme_credit
          label: 显示主题版权
          value: true

    - group: features
      label: 前端增强
      formSchema:
        - $formkit: checkbox
          name: enable_fancybox
          label: 图片灯箱
          value: true
        - $formkit: checkbox
          name: enable_reading_progress
          label: 阅读进度
          value: true
        - $formkit: checkbox
          name: enable_code_copy
          label: 代码复制
          value: true
        - $formkit: checkbox
          name: enable_smooth_scroll
          label: 平滑滚动
          value: true
        - $formkit: checkbox
          name: enable_lazyload
          label: 图片懒加载
          value: true
        - $formkit: checkbox
          name: enable_back_to_top
          label: 返回顶部
          value: true

    - group: custom_code
      label: 自定义代码
      formSchema:
        - $formkit: code
          name: custom_head
          label: 自定义 Head
          value: ""
          language: html
        - $formkit: code
          name: custom_css
          label: 自定义 CSS
          value: ""
          language: css
        - $formkit: code
          name: custom_js
          label: 自定义 JavaScript
          value: ""
          language: javascript
        - $formkit: code
          name: custom_footer
          label: 自定义 Footer
          value: ""
          language: html
